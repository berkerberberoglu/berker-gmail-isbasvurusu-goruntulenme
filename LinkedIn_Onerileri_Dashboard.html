let currentTab = 'aktif';
let sortDesc = true;

function getStatus(job) {
  return localStorage.getItem('js_' + job.id) || job.status || 'incelenecek';
}

function setStatus(id, val) {
  localStorage.setItem('js_' + id, val);
  renderCards();
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderCards();
}

function toggleSort() {
  sortDesc = !sortDesc;
  document.getElementById('sortLabel').textContent = sortDesc ? 'Yeniden Eskiye' : 'Eskiden Yeniye';
  renderCards();
}

function renderCards() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const wf = document.getElementById('workFilter').value;

  let jobs = JOBS.filter(j => {
    const s = getStatus(j);
    if (currentTab === 'aktif') return s === 'incelenecek';
    return s === currentTab;
  });

  if (q) jobs = jobs.filter(j => j.company.toLowerCase().includes(q) || j.pos.toLowerCase().includes(q));
  if (wf) jobs = jobs.filter(j => j.work === wf);

  jobs.sort((a, b) => sortDesc ? b.date.localeCompare(a.date) : a.date.localeCompare(b.date));

  const container = document.getElementById('cardContainer');
  container.innerHTML = '';
  if (jobs.length === 0) {
    container.innerHTML = '<div class="empty">Bu sekmede ilan yok.</div>';
  } else {
    jobs.forEach(j => container.appendChild(buildCard(j)));
  }
  updateCounts();
}

function buildCard(j) {
  const status = getStatus(j);
  const srcTag = j.src === 'alarm'
    ? '<span class="tag alarm">🔔 Alarm</span>'
    : '<span class="tag apply">📩 Başvuru</span>';
  const catLabel = {big:'Büyük Marka', mid:'Mid', startup:'Startup', remote:'Remote', warn:'⚠️ Dikkat'}[j.cat] || j.cat;
  const intTag = j.note && j.note.includes('MÜLAKAT') ? '<span class="tag interview">🎯 MÜLAKAT</span>' : '';
  const scrTag = j.script ? `<span class="tag script">💬 ${j.script}</span>` : '';
  const qnbTag = j.company.includes('QNB') ? '<span class="tag warn">⚠️ Çok başvuru</span>' : '';

  const d = document.createElement('div');
  d.className = `card cat-${j.cat}`;
  d.innerHTML = `
    <div class="card-top">
      <div style="flex:1">
        <div class="card-company">${j.company}</div>
        <div class="card-title">${j.pos}</div>
        <div class="card-meta">📍 ${j.loc} · ${j.work} · ${j.date}</div>
      </div>
      <div class="fit">${j.fit}</div>
    </div>
    ${j.note ? `<div class="card-note">${j.note}</div>` : ''}
    <div class="card-tags">
      ${srcTag}
      <span class="tag ${j.cat}">${catLabel}</span>
      ${intTag}${qnbTag}${scrTag}
    </div>
    <div class="card-bottom">
      <a class="view-btn" href="${j.url}">Görüntüle →</a>
      <select class="status-select status-${status}"
        onchange="setStatus(${j.id},this.value);this.className='status-select status-'+this.value">
        <option value="incelenecek" ${status==='incelenecek'?'selected':''}>İncelenecek</option>
        <option value="basvuruldu" ${status==='basvuruldu'?'selected':''}>Başvuruldu</option>
        <option value="ilgisiz" ${status==='ilgisiz'?'selected':''}>İlgisiz</option>
      </select>
    </div>
  `;
  return d;
}

function updateCounts() {
  const c = {incelenecek:0, basvuruldu:0, ilgisiz:0};
  JOBS.forEach(j => { c[getStatus(j)]++; });
  document.getElementById('cnt-aktif').textContent = c.incelenecek;
  document.getElementById('cnt-incelenecek').textContent = c.incelenecek;
  document.getElementById('cnt-basvuruldu').textContent = c.basvuruldu;
  document.getElementById('cnt-ilgisiz').textContent = c.ilgisiz;
}

renderCards();
</script>
